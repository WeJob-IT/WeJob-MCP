name: Validate plugin

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plugin manifest
        run: claude plugin validate plugins/wejob

      - name: Marketplace JSON syntax check
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('marketplace.json OK')"
